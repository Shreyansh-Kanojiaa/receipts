# Rendered by the nginx image's envsubst at startup (only ${VIEWER_KEY} and
# ${BACKEND_HOST} are substituted; nginx's own $host/$uri are preserved because
# they are not in the environment).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the backend API. The viewer key is injected here so the
    # dashboard bundle never contains a credential.
    location ~ ^/(stats|receipts|sessions|verify|tools|demo|alerts|healthz|readyz) {
        proxy_pass http://${BACKEND_HOST};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer ${PROXY_KEY}";
    }
}
