# Receipts — self-hosted single-tenant deployment.
# Copy .env.example to .env and fill in secrets/keys first.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      RECEIPT_SECRET: ${RECEIPT_SECRET:?set RECEIPT_SECRET in .env}
      DATABASE_URL: sqlite:////data/receipts.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      API_KEYS: ${API_KEYS:?set API_KEYS in .env}
      ENABLE_DEMO_TOOLS: ${ENABLE_DEMO_TOOLS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      RATE_LIMIT: ${RATE_LIMIT:-120/minute}
    volumes:
      - receipts-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      # nginx envsubst targets (see frontend/nginx.conf).
      BACKEND_HOST: backend:8000
      PROXY_KEY: ${RECEIPTS_PROXY_KEY:?set RECEIPTS_PROXY_KEY in .env}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  receipts-data:
